overview: |
  An Easytrieve REPORT section is a high-level declarative specification.
  It must be expanded into explicit COBOL code covering:
    1. WORKING-STORAGE items  — output line layouts, accumulators, counters, save areas, flags
    2. PROCEDURE DIVISION paragraphs — headings, detail print, control break, end-of-report

  Always output WORKING-STORAGE additions under the "--- WORKING-STORAGE ---" marker
  and procedure paragraphs under the "--- PROCEDURE ---" marker.

required_ws: |
  Generate these items for EVERY report (adjust values if LINESIZE/PAGESIZE directives appear):

    01  WS-PAGE-CTR        PIC 9(4)   VALUE ZERO.
    01  WS-LINE-CTR        PIC 9(3)   VALUE ZERO.
    01  WS-PAGE-LIMIT      PIC 9(3)   VALUE 60.
    01  WS-LINE-LIMIT      PIC 9(3)   VALUE 55.
    01  PRINT-REC          PIC X(133) VALUE SPACES.

required_paragraphs: |
  Generate these paragraphs for EVERY report (replace {RPTNAME} with the report name):

    {RPTNAME}-HEADINGS
      — Increment WS-PAGE-CTR, reset WS-LINE-CTR to zero.
      — WRITE PRINT-REC FROM WS-{RPTNAME}-TITLE AFTER ADVANCING PAGE.
      — Write any heading lines AFTER ADVANCING 1 LINE.

    {RPTNAME}-DETAIL
      — MOVE each PRINT field into the corresponding detail line subfield.
      — WRITE PRINT-REC FROM WS-{RPTNAME}-DTL AFTER ADVANCING 1 LINE.
      — ADD 1 TO WS-LINE-CTR.
      — IF WS-LINE-CTR >= WS-LINE-LIMIT PERFORM {RPTNAME}-HEADINGS END-IF.

    {RPTNAME}-END
      — Write any FOOTING line.
      — Write final totals for SUM/COUNT fields.

directives:
  TITLE:
    description: "Report title — printed at the top of every page."
    working_storage: |
      01  WS-{RPTNAME}-TITLE.
          05  FILLER   PIC X({lpad}) VALUE SPACES.
          05  FILLER   PIC X({len})  VALUE '{text}'.
          05  FILLER   PIC X({rpad}) VALUE SPACES.
    cobol_action: "WRITE PRINT-REC FROM WS-{RPTNAME}-TITLE AFTER ADVANCING PAGE"

  HEADING:
    description: "Column headings — printed after the title on each new page."
    working_storage: |
      01  WS-{RPTNAME}-HDG.
          05  FILLER   PIC X({col_pos})  VALUE SPACES.
          05  FILLER   PIC X({col_len})  VALUE '{col_text}'.
          [repeat 05 entries for each column]
    cobol_action: "WRITE PRINT-REC FROM WS-{RPTNAME}-HDG AFTER ADVANCING 2 LINES"

  LINESIZE:
    description: "Maximum print columns per line (default 132). Sets WS-LINE-LIMIT."
    working_storage: "Override VALUE in WS-LINE-LIMIT to {n}."

  PAGESIZE:
    description: "Maximum lines per page before a heading eject (default 60). Sets WS-PAGE-LIMIT."
    working_storage: "Override VALUE in WS-PAGE-LIMIT to {n}; set WS-LINE-LIMIT to {n} minus 5."

  SEQUENCE:
    description: |
      Declares the field(s) the input is sorted by.
      No COBOL procedure code needed when input arrives pre-sorted.
      Document with a comment: *  SEQUENCE ON {field}.

  CONTROL:
    description: |
      Control-break field. When its value changes between records,
      subtotals are printed, accumulators reset, and headings reprinted.
    working_storage: |
      01  WS-{FIELD}-SAVE   PIC {pic-of-field} VALUE SPACES.
    procedure: |
      {RPTNAME}-CHECK-BREAK.
          IF {FIELD} NOT = WS-{FIELD}-SAVE
              PERFORM {RPTNAME}-CONTROL-BREAK
          END-IF.

      {RPTNAME}-CONTROL-BREAK.
          [write subtotal lines for every SUM and COUNT field]
          MOVE ZEROS  TO [every accumulator and counter]
          MOVE {FIELD} TO WS-{FIELD}-SAVE
          PERFORM {RPTNAME}-HEADINGS.

  SUM:
    description: |
      Numeric accumulator. ADD to it on every detail record.
      Print and reset on each control break and at end of report.
    working_storage: |
      01  WS-{FIELD}-TOT   PIC S9(12)V9(2) COMP-3 VALUE ZERO.
      01  WS-{FIELD}-TOT-D PIC Z(11)9.99.          [edited form for printing]
    procedure: |
      [In detail processing:]
        ADD {FIELD} TO WS-{FIELD}-TOT
      [On control break / end-of-report:]
        MOVE WS-{FIELD}-TOT  TO WS-{FIELD}-TOT-D
        WRITE PRINT-REC FROM WS-SUBTOTAL-LINE AFTER ADVANCING 1 LINE
        MOVE ZERO TO WS-{FIELD}-TOT

  COUNT:
    description: |
      Record counter. ADD 1 on every detail record.
      Print and reset on each control break and at end of report.
    working_storage: |
      01  WS-{RPTNAME}-CNT   PIC S9(8) COMP-3 VALUE ZERO.
      01  WS-{RPTNAME}-CNT-D PIC Z(7)9.        [edited form for printing]
    procedure: |
      [In detail processing:]
        ADD 1 TO WS-{RPTNAME}-CNT
      [On control break / end-of-report:]
        MOVE WS-{RPTNAME}-CNT  TO WS-{RPTNAME}-CNT-D
        WRITE PRINT-REC FROM WS-COUNT-LINE AFTER ADVANCING 1 LINE
        MOVE ZERO TO WS-{RPTNAME}-CNT

  PRINT:
    description: |
      Defines which fields appear on each detail output line.
      Build a WS detail-line record with one subfield per printed field,
      separated by FILLER spaces to achieve column alignment.
    working_storage: |
      01  WS-{RPTNAME}-DTL.
          05  FILLER          PIC X({col_pos})  VALUE SPACES.
          05  WS-DTL-{FLD1}   PIC {pic1}.
          05  FILLER          PIC X({gap})      VALUE SPACES.
          05  WS-DTL-{FLD2}   PIC {pic2}.
          [repeat for each field in the PRINT list]
    procedure: |
      [In {RPTNAME}-DETAIL:]
        MOVE {FLD1} TO WS-DTL-{FLD1}
        MOVE {FLD2} TO WS-DTL-{FLD2}
        WRITE PRINT-REC FROM WS-{RPTNAME}-DTL AFTER ADVANCING 1 LINE
        ADD 1 TO WS-LINE-CTR
        IF WS-LINE-CTR >= WS-LINE-LIMIT
            PERFORM {RPTNAME}-HEADINGS
        END-IF

  FOOTING:
    description: "Text line printed at the very end of the report."
    working_storage: |
      01  WS-{RPTNAME}-FOOT.
          05  FILLER   PIC X({lpad}) VALUE SPACES.
          05  FILLER   PIC X({len})  VALUE '{text}'.
    procedure: |
      [In {RPTNAME}-END:]
        WRITE PRINT-REC FROM WS-{RPTNAME}-FOOT AFTER ADVANCING 2 LINES
